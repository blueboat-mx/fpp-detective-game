<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <title>쓰레기 수사단 · 환경 비밀수사단</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
/* =============================================================================
   Montage / WDS — Design Tokens (light theme defaults; dark via [data-theme="dark"])
   Source: wanteddev/montage-web @ main, packages/wds-theme/*
   ============================================================================= */

@font-face {
  font-family: "Pretendard Variable";
  src: url("design-system/fonts/PretendardVariable.woff2") format("woff2-variations");
  font-weight: 45 920;
  font-style: normal;
  font-display: swap;
}

:root {
  /* ─── Atomic — common ─── */
  --atomic-common-0: #000000;
  --atomic-common-100: #ffffff;

  /* ─── Atomic — blue (primary) ─── */
  --atomic-blue-10: #001536;
  --atomic-blue-20: #002966;
  --atomic-blue-30: #003E9C;
  --atomic-blue-40: #0054D1;
  --atomic-blue-45: #005EEB;
  --atomic-blue-50: #0066FF;
  --atomic-blue-55: #1A75FF;
  --atomic-blue-60: #3385FF;
  --atomic-blue-65: #4F95FF;
  --atomic-blue-70: #69A5FF;
  --atomic-blue-80: #9EC5FF;
  --atomic-blue-90: #C9DEFE;
  --atomic-blue-95: #EAF2FE;
  --atomic-blue-99: #F7FBFF;

  /* ─── Atomic — coolNeutral (text + bg) ─── */
  --atomic-coolNeutral-5: #0F0F10;
  --atomic-coolNeutral-7: #141415;
  --atomic-coolNeutral-10: #171719;
  --atomic-coolNeutral-15: #1B1C1E;
  --atomic-coolNeutral-17: #212225;
  --atomic-coolNeutral-20: #292A2D;
  --atomic-coolNeutral-22: #2E2F33;
  --atomic-coolNeutral-23: #333438;
  --atomic-coolNeutral-25: #37383C;
  --atomic-coolNeutral-30: #46474C;
  --atomic-coolNeutral-40: #5A5C63;
  --atomic-coolNeutral-50: #70737C;
  --atomic-coolNeutral-60: #878A93;
  --atomic-coolNeutral-70: #989BA2;
  --atomic-coolNeutral-80: #AEB0B6;
  --atomic-coolNeutral-90: #C2C4C8;
  --atomic-coolNeutral-95: #DBDCDF;
  --atomic-coolNeutral-96: #E1E2E4;
  --atomic-coolNeutral-97: #EAEBEC;
  --atomic-coolNeutral-98: #F4F4F5;
  --atomic-coolNeutral-99: #F7F7F8;

  /* ─── Atomic — neutral (warm; used for shadow color) ─── */
  --atomic-neutral-10: #171717;

  /* ─── Atomic — accent palettes (accent.foreground/background tokens reference these) ─── */
  --atomic-red-40: #E52222;     --atomic-red-50: #FF4242;     --atomic-red-60: #FF6363;
  --atomic-redOrange-48: #F55A00; --atomic-redOrange-50: #FF5E00; --atomic-redOrange-60: #FF7B2E;
  --atomic-orange-39: #D17600;  --atomic-orange-50: #FF9200;  --atomic-orange-60: #FFA938;
  --atomic-lime-37: #429E00;    --atomic-lime-50: #58CF04;    --atomic-lime-60: #6BE016;
  --atomic-green-40: #009632;   --atomic-green-50: #00BF40;   --atomic-green-60: #1ED45A;
  --atomic-cyan-40: #0098B2;    --atomic-cyan-50: #00BDDE;    --atomic-cyan-60: #28D0ED;
  --atomic-lightBlue-40: #008DCF; --atomic-lightBlue-50: #00AEFF; --atomic-lightBlue-60: #3DC2FF;
  --atomic-violet-45: #5B37ED;  --atomic-violet-50: #6541F2;  --atomic-violet-60: #7D5EF7;
  --atomic-purple-40: #AD36E3;  --atomic-purple-50: #CB59FF;  --atomic-purple-60: #D478FF;
  --atomic-pink-46: #E846CD;    --atomic-pink-50: #F553DA;    --atomic-pink-60: #FA73E3;

  /* =============================================================
     SEMANTIC TOKENS — light
     ============================================================= */

  /* static (theme-agnostic) */
  --semantic-static-white: #ffffff;
  --semantic-static-black: #000000;

  /* primary */
  --semantic-primary-normal: var(--atomic-blue-50);
  --semantic-primary-strong: var(--atomic-blue-45);
  --semantic-primary-heavy:  var(--atomic-blue-40);

  /* label (text colors) */
  --semantic-label-normal:      var(--atomic-coolNeutral-10);
  --semantic-label-strong:      #000000;
  --semantic-label-neutral:      #2E2F33E0; /* coolNeutral.22 @88% */
  --semantic-label-alternative:  #37383C9C; /* coolNeutral.25 @61% */
  --semantic-label-assistive:    #37383C47; /* coolNeutral.25 @28% */
  --semantic-label-disable:      #37383C29; /* coolNeutral.25 @16% */

  /* background */
  --semantic-background-normal-normal: #ffffff;
  --semantic-background-normal-alternative: var(--atomic-coolNeutral-99);
  --semantic-background-elevated-normal: #ffffff;
  --semantic-background-elevated-alternative: var(--atomic-coolNeutral-99);
  --semantic-background-transparent-normal: #ffffff14;
  --semantic-background-transparent-alternative: #ffffff47;

  /* interaction */
  --semantic-interaction-inactive: var(--atomic-coolNeutral-70);
  --semantic-interaction-disable:  var(--atomic-coolNeutral-98);

  /* lines (dividers, borders) */
  --semantic-line-normal-normal:      #70737C38; /* coolNeutral.50 @22% */
  --semantic-line-normal-neutral:     #70737C29; /* @16% */
  --semantic-line-normal-alternative: #70737C14; /* @8% */
  --semantic-line-solid-normal:       var(--atomic-coolNeutral-96);
  --semantic-line-solid-neutral:      var(--atomic-coolNeutral-97);
  --semantic-line-solid-alternative:  var(--atomic-coolNeutral-98);

  /* status */
  --semantic-status-positive:   var(--atomic-green-50);
  --semantic-status-cautionary: var(--atomic-orange-50);
  --semantic-status-negative:   var(--atomic-red-50);

  /* fill (translucent surfaces) */
  --semantic-fill-normal:      #70737C14; /* @8% */
  --semantic-fill-strong:      #70737C29; /* @16% */
  --semantic-fill-alternative: #70737C0D; /* @5% */

  /* material */
  --semantic-material-dimmer: #17171985; /* coolNeutral.10 @52% */

  /* inverse */
  --semantic-inverse-primary:    var(--atomic-blue-60);
  --semantic-inverse-background: var(--atomic-coolNeutral-15);
  --semantic-inverse-label:      var(--atomic-coolNeutral-99);

  /* accent foreground (light theme) */
  --semantic-accent-fg-red:        var(--atomic-red-40);
  --semantic-accent-fg-redOrange:  var(--atomic-redOrange-48);
  --semantic-accent-fg-orange:     var(--atomic-orange-39);
  --semantic-accent-fg-lime:       var(--atomic-lime-37);
  --semantic-accent-fg-green:      var(--atomic-green-40);
  --semantic-accent-fg-cyan:       var(--atomic-cyan-40);
  --semantic-accent-fg-lightBlue:  var(--atomic-lightBlue-40);
  --semantic-accent-fg-blue:       var(--atomic-blue-45);
  --semantic-accent-fg-violet:     var(--atomic-violet-45);
  --semantic-accent-fg-purple:     var(--atomic-purple-40);
  --semantic-accent-fg-pink:       var(--atomic-pink-46);

  /* elevation — shadows (use #171717 with opacity) */
  --shadow-xsmall: 0px 1px 2px -1px #1717171A;
  --shadow-small:  0px 2px 4px -2px #1717170F, 0px 4px 6px -1px #1717170F;
  --shadow-medium: 0px 4px 6px -2px #17171712, 0px 10px 15px -3px #17171712;
  --shadow-large:  0px 6px 10px -4px #17171714, 0px 16px 24px -6px #17171714;
  --shadow-xlarge: 0px 10px 15px -5px #1717171A, 0px 24px 38px -10px #1717171F;
  --shadow-spread-small:  0px 0px 60px 0px #1717171A;
  --shadow-spread-medium: 0px 15px 75px 0px #17171729;

  /* spacing */
  --space-0: 0px; --space-0_5: 0.5px; --space-1: 1px; --space-2: 2px;
  --space-4: 4px; --space-6: 6px; --space-8: 8px; --space-10: 10px;
  --space-12: 12px; --space-14: 14px; --space-16: 16px; --space-20: 20px;
  --space-24: 24px; --space-32: 32px; --space-40: 40px; --space-48: 48px;
  --space-56: 56px; --space-64: 64px; --space-72: 72px; --space-80: 80px;

  /* breakpoints (for media queries; mirrored values) */
  --bp-xl: 1600px; --bp-lg: 1200px; --bp-md: 992px; --bp-sm: 768px; --bp-xs: 0px;

  --z-modal: 1300;

  /* =============================================================
     TYPOGRAPHY
     ============================================================= */
  --font-sans: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
    system-ui, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic",
    "Helvetica Neue", Helvetica, Arial, sans-serif;

  /* Display — for hero/marketing surfaces (always bold 700) */
  --type-display1-size: 3.5rem;    --type-display1-line: 4.5rem;   --type-display1-tracking: -0.0319em;
  --type-display2-size: 2.5rem;    --type-display2-line: 3.25rem;  --type-display2-tracking: -0.0282em;
  --type-display3-size: 2.25rem;   --type-display3-line: 3rem;     --type-display3-tracking: -0.027em;

  /* Title — for page titles (bold 700) */
  --type-title1-size: 2rem;        --type-title1-line: 2.75rem;   --type-title1-tracking: -0.0253em;
  --type-title2-size: 1.75rem;     --type-title2-line: 2.375rem;  --type-title2-tracking: -0.0236em;
  --type-title3-size: 1.5rem;      --type-title3-line: 2rem;      --type-title3-tracking: -0.023em;

  /* Heading — for card/section headers (bold 600) */
  --type-heading1-size: 1.375rem;  --type-heading1-line: 1.875rem;--type-heading1-tracking: -0.0194em;
  --type-heading2-size: 1.25rem;   --type-heading2-line: 1.75rem; --type-heading2-tracking: -0.012em;

  /* Headline — emphasised inline content */
  --type-headline1-size: 1.125rem; --type-headline1-line: 1.625rem; --type-headline1-tracking: -0.002em;
  --type-headline2-size: 1.0625rem;--type-headline2-line: 1.5rem;   --type-headline2-tracking: 0;

  /* Body — paragraph copy */
  --type-body1-size: 1rem;         --type-body1-line: 1.5rem;     --type-body1-tracking: 0.0057em;
  --type-body1-reading-line: 1.625rem;
  --type-body2-size: 0.9375rem;    --type-body2-line: 1.375rem;   --type-body2-tracking: 0.0096em;
  --type-body2-reading-line: 1.5rem;

  /* Label — UI controls */
  --type-label1-size: 0.875rem;    --type-label1-line: 1.25rem;   --type-label1-tracking: 0.0145em;
  --type-label1-reading-line: 1.375rem;
  --type-label2-size: 0.8125rem;   --type-label2-line: 1.125rem;  --type-label2-tracking: 0.0194em;

  /* Caption — metadata, timestamps */
  --type-caption1-size: 0.75rem;   --type-caption1-line: 1rem;    --type-caption1-tracking: 0.0252em;
  --type-caption2-size: 0.6875rem; --type-caption2-line: 0.875rem;--type-caption2-tracking: 0.0311em;

  /* radii (button-derived) */
  --radius-sm: 8px;   /* button.small */
  --radius-md: 10px;  /* button.medium, input */
  --radius-lg: 12px;  /* button.large, card */
  --radius-xl: 16px;
  --radius-2xl: 20px;
  --radius-full: 9999px;
}

/* =============================================================
   DARK theme overrides
   ============================================================= */
[data-theme="dark"] {
  --semantic-primary-normal: var(--atomic-blue-60);
  --semantic-primary-strong: var(--atomic-blue-55);
  --semantic-primary-heavy:  var(--atomic-blue-50);

  --semantic-label-normal:       var(--atomic-coolNeutral-99);
  --semantic-label-strong:       #ffffff;
  --semantic-label-neutral:      #C2C4C8E0; /* coolNeutral.90 @88% */
  --semantic-label-alternative:  #AEB0B69C; /* coolNeutral.80 @61% */
  --semantic-label-assistive:    #AEB0B647; /* coolNeutral.80 @28% */
  --semantic-label-disable:      #989BA229; /* coolNeutral.70 @16% */

  --semantic-background-normal-normal:        var(--atomic-coolNeutral-15);
  --semantic-background-normal-alternative:   var(--atomic-coolNeutral-5);
  --semantic-background-elevated-normal:      var(--atomic-coolNeutral-17);
  --semantic-background-elevated-alternative: var(--atomic-coolNeutral-7);
  --semantic-background-transparent-normal:      #2122259C;
  --semantic-background-transparent-alternative: #2122259C;

  --semantic-interaction-inactive: var(--atomic-coolNeutral-40);
  --semantic-interaction-disable:  var(--atomic-coolNeutral-22);

  --semantic-line-normal-normal:      #70737C52; /* @32% */
  --semantic-line-normal-neutral:     #70737C47;
  --semantic-line-normal-alternative: #70737C38;
  --semantic-line-solid-normal:       var(--atomic-coolNeutral-25);

  --semantic-line-solid-alternative:  var(--atomic-coolNeutral-22);

  --semantic-status-positive:   var(--atomic-green-60);
  --semantic-status-cautionary: var(--atomic-orange-60);
  --semantic-status-negative:   var(--atomic-red-60);

  --semantic-fill-normal:      #70737C38; /* @22% */
  --semantic-fill-strong:      #70737C47; /* @28% */
  --semantic-fill-alternative: #70737C1F; /* @12% */

  --semantic-material-dimmer: #171719BD; /* @74% */

  --semantic-inverse-primary:    var(--atomic-blue-50);
  --semantic-inverse-background: #ffffff;
  --semantic-inverse-label:      var(--atomic-coolNeutral-10);
}

/* =============================================================
   GLOBAL — applies Pretendard + label color globally
   ============================================================= */
html {
  font-family: var(--font-sans);
  color: var(--semantic-label-normal);
  background: var(--semantic-background-normal-normal);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* =============================================================
   SEMANTIC TYPE CLASSES (mirror <Typography variant=…> from WDS)
   ============================================================= */
.t-display1   { font-size: var(--type-display1-size);   line-height: var(--type-display1-line);   letter-spacing: var(--type-display1-tracking);   font-weight: 700; }
.t-display2   { font-size: var(--type-display2-size);   line-height: var(--type-display2-line);   letter-spacing: var(--type-display2-tracking);   font-weight: 700; }
.t-display3   { font-size: var(--type-display3-size);   line-height: var(--type-display3-line);   letter-spacing: var(--type-display3-tracking);   font-weight: 700; }
.t-title1     { font-size: var(--type-title1-size);     line-height: var(--type-title1-line);     letter-spacing: var(--type-title1-tracking);     font-weight: 700; }
.t-title2     { font-size: var(--type-title2-size);     line-height: var(--type-title2-line);     letter-spacing: var(--type-title2-tracking);     font-weight: 700; }
.t-title3     { font-size: var(--type-title3-size);     line-height: var(--type-title3-line);     letter-spacing: var(--type-title3-tracking);     font-weight: 700; }
.t-heading1   { font-size: var(--type-heading1-size);   line-height: var(--type-heading1-line);   letter-spacing: var(--type-heading1-tracking);   font-weight: 600; }
.t-heading2   { font-size: var(--type-heading2-size);   line-height: var(--type-heading2-line);   letter-spacing: var(--type-heading2-tracking);   font-weight: 600; }
.t-headline1  { font-size: var(--type-headline1-size);  line-height: var(--type-headline1-line);  letter-spacing: var(--type-headline1-tracking);  font-weight: 600; }
.t-headline2  { font-size: var(--type-headline2-size);  line-height: var(--type-headline2-line);  letter-spacing: var(--type-headline2-tracking);  font-weight: 600; }
.t-body1      { font-size: var(--type-body1-size);      line-height: var(--type-body1-line);      letter-spacing: var(--type-body1-tracking);      font-weight: 400; }
.t-body1-rd   { font-size: var(--type-body1-size);      line-height: var(--type-body1-reading-line); letter-spacing: var(--type-body1-tracking);   font-weight: 400; }
.t-body2      { font-size: var(--type-body2-size);      line-height: var(--type-body2-line);      letter-spacing: var(--type-body2-tracking);      font-weight: 400; }
.t-body2-rd   { font-size: var(--type-body2-size);      line-height: var(--type-body2-reading-line); letter-spacing: var(--type-body2-tracking);   font-weight: 400; }
.t-label1     { font-size: var(--type-label1-size);     line-height: var(--type-label1-line);     letter-spacing: var(--type-label1-tracking);     font-weight: 500; }
.t-label1-rd  { font-size: var(--type-label1-size);     line-height: var(--type-label1-reading-line); letter-spacing: var(--type-label1-tracking); font-weight: 500; }
.t-label2     { font-size: var(--type-label2-size);     line-height: var(--type-label2-line);     letter-spacing: var(--type-label2-tracking);     font-weight: 500; }
.t-caption1   { font-size: var(--type-caption1-size);   line-height: var(--type-caption1-line);   letter-spacing: var(--type-caption1-tracking);   font-weight: 400; }

/* Weight modifier */
.fw-regular { font-weight: 400 !important; }
.fw-medium  { font-weight: 500 !important; }
.fw-bold    { font-weight: 600 !important; }
.fw-bolder  { font-weight: 700 !important; }
/* ============================================================
   쓰레기 수사단 — Detective Plogging Mobile Web
   Built on Wanted/Montage tokens (FPP-style blue) +
   police-line yellow accent + case-file detail typography.
   ============================================================ */

:root {
  /* FPP / Montage primary blue maps to atomic-blue-50 */
  --fpp-blue: var(--atomic-blue-50);          /* #0066FF */
  --fpp-blue-deep: var(--atomic-blue-30);     /* #003E9C */
  --fpp-blue-soft: var(--atomic-blue-95);     /* #EAF2FE */

  /* Detective-tone navy (deeper than blue) */
  --case-navy: #0B1733;
  --case-navy-2: #16213F;
  --case-navy-3: #243456;

  /* Police-line yellow + black */
  --tape-yellow: #FFD400;
  --tape-yellow-deep: #E5BD00;
  --tape-black: #14151A;

  /* Case-file paper */
  --paper: #F5F1E8;
  --paper-2: #ECE6D6;
  --paper-line: #DCD4BD;

  /* Status */
  --danger: #E52222;
  --warn: #FF9200;
  --ok: #00BF40;

  /* Layout */
  --maxw: 440px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);

  /* Mono caption font (case-file numbers) */
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  background: #0a0d14;
  color: var(--semantic-label-normal);
  font-family: var(--font-sans);
  min-height: 100vh;
  /* Korean: never break inside words; break at word boundaries only */
  word-break: keep-all;
  overflow-wrap: break-word;
}

/* Phone shell — mobile-first, framed on desktop */
.phone-shell {
  width: 100%;
  max-width: var(--maxw);
  margin: 0 auto;
  min-height: 100vh;
  background: var(--paper);
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 30px 80px -20px rgba(0,0,0,0.5);
}
@media (min-width: 720px) {
  body { display: grid; place-items: center; padding: 32px 16px; }
  .phone-shell {
    min-height: min(900px, calc(100vh - 64px));
    height: 900px;
    border-radius: 36px;
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .phone-scroll { height: 100%; }
}

.phone-scroll {
  height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
}
@media (min-width: 720px) {
  .phone-scroll { height: 900px; }
}

/* ============================================================
   Police-line yellow tape (diagonal stripes)
   ============================================================ */
.tape {
  background:
    repeating-linear-gradient(
      -45deg,
      var(--tape-yellow) 0 18px,
      var(--tape-black) 18px 30px
    );
  height: 14px;
  width: 100%;
  position: relative;
}
.tape-with-text {
  background: var(--tape-yellow);
  color: var(--tape-black);
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.04em;
  padding: 6px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  position: relative;
}
/* ASCII-only caption helper: caps + wide tracking */
.cap { text-transform: uppercase; letter-spacing: 0.16em; }
.cap-tight { text-transform: uppercase; letter-spacing: 0.08em; }
.tape-with-text::before,
.tape-with-text::after {
  content: "";
  position: absolute;
  top: 0; bottom: 0;
  width: 18px;
  background: repeating-linear-gradient(
    -45deg,
    var(--tape-yellow) 0 6px,
    var(--tape-black) 6px 10px
  );
}
.tape-with-text::before { left: 0; }
.tape-with-text::after { right: 0; }
.tape-with-text > * { margin: 0 22px; }

/* ============================================================
   Top chrome — progress bar + status
   ============================================================ */
.topbar {
  position: sticky;
  top: 0;
  z-index: 30;
  background: var(--case-navy);
  color: #fff;
  padding-top: var(--safe-top);
}
.topbar-inner {
  padding: 10px 16px 12px;
}
.topbar-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.55);
  margin-bottom: 8px;
}
.topbar-meta .case-no { color: var(--tape-yellow); letter-spacing: 0.08em; font-weight: 700; }
.topbar-meta .agent-name { color: #fff; font-weight: 600; letter-spacing: 0.06em; text-transform: none; font-family: var(--font-sans); font-size: 12px;}

.progress {
  display: flex;
  align-items: center;
  gap: 4px;
  width: 100%;
}
.progress-step {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-width: 0;
}
.progress-step .dot {
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.15);
  transition: background .3s ease;
}
.progress-step.done .dot { background: var(--tape-yellow); }
.progress-step.active .dot { background: var(--fpp-blue); box-shadow: 0 0 0 1px rgba(255,255,255,0.2), 0 0 8px var(--fpp-blue); }
.progress-step .label {
  font-size: 10px;
  letter-spacing: 0;
  color: rgba(255,255,255,0.45);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  font-weight: 500;
  width: 100%;
  text-align: center;
}
.progress-step.done .label { color: rgba(255,255,255,0.75); }
.progress-step.active .label { color: #fff; font-weight: 700; }
.progress-step .check {
  position: absolute;
  font-size: 9px;
  color: var(--case-navy);
  font-weight: 800;
}

/* ============================================================
   Screen wrapper + transitions
   ============================================================ */
.screen {
  padding: 18px 18px 200px;
  animation: screen-in .35s ease-out;
}
@keyframes screen-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   Headers
   ============================================================ */
.mission-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--case-navy);
  color: #fff;
  padding: 6px 12px 6px 10px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  font-weight: 700;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
}
.mission-tag.has-ko { letter-spacing: 0.04em; text-transform: none; }
.mission-tag .pin {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--danger);
  box-shadow: 0 0 0 2px rgba(229,34,34,0.25);
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(229,34,34,0.55); }
  50%      { box-shadow: 0 0 0 6px rgba(229,34,34,0); }
}
.screen-title {
  font-size: 28px;
  line-height: 1.2;
  font-weight: 800;
  color: var(--case-navy);
  margin: 12px 0 4px;
  letter-spacing: -0.02em;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.screen-title .yellow {
  color: var(--case-navy);
  position: relative;
  display: inline-block;
  white-space: nowrap;
}
.screen-title .yellow::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: 2px;
  height: 10px; background: var(--tape-yellow); z-index: -1; opacity: 0.85;
}
.screen-sub {
  font-size: 12px;
  color: rgba(11,23,51,0.6);
  margin-bottom: 18px;
  font-family: var(--font-mono);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}

/* ============================================================
   Chat-style messages from 선너굴
   ============================================================ */
.msg-thread { display: flex; flex-direction: column; gap: 10px; margin: 18px 0; }
.msg {
  background: #fff;
  border: 1px solid var(--paper-line);
  border-radius: 16px 16px 16px 4px;
  padding: 12px 14px;
  font-size: 14.5px;
  line-height: 1.55;
  color: var(--case-navy);
  box-shadow: 0 1px 0 var(--paper-line);
  max-width: 92%;
  align-self: flex-start;
  opacity: 0;
  transform: translateY(6px);
  animation: msg-in .35s ease-out forwards;
  white-space: pre-wrap;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.msg.from-agent {
  align-self: flex-end;
  border-radius: 16px 16px 4px 16px;
  background: var(--fpp-blue);
  color: #fff;
  border-color: var(--fpp-blue);
}
@keyframes msg-in {
  to { opacity: 1; transform: translateY(0); }
}
.msg-author {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px;
  font-family: var(--font-mono);
  letter-spacing: 0.1em;
  color: var(--case-navy-3);
  margin: 4px 0 -2px 4px;
  text-transform: uppercase;
}
.msg-author .badge {
  background: var(--case-navy);
  color: var(--tape-yellow);
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
}

/* ============================================================
   Cards
   ============================================================ */
.card {
  background: #fff;
  border: 1px solid var(--paper-line);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 6px 14px -10px rgba(11,23,51,0.18);
}
.card.tight { padding: 12px 14px; }
.card-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--case-navy);
  font-family: var(--font-sans);
  letter-spacing: -0.01em;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  word-break: keep-all;
  flex-wrap: wrap;
}
.card-title.en { font-family: var(--font-mono); letter-spacing: 0.16em; text-transform: uppercase; font-size: 13px; }
.card-title .ico {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
  background: var(--case-navy); color: var(--tape-yellow);
  border-radius: 5px;
  font-family: var(--font-mono);
  font-size: 12px;
}

/* Map card */
.map-card { padding: 0; overflow: hidden; }
.map-card .map-img {
  width: 100%;
  aspect-ratio: 16/11;
  background: var(--paper-2);
  position: relative;
  display: block;
  overflow: hidden;
}
.map-card .map-img img,
.map-card .map-img .real-map {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.map-card .map-img .map-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(11,23,51,0.45), rgba(11,23,51,0) 30%, rgba(11,23,51,0) 70%, rgba(11,23,51,0.35));
  pointer-events: none;
}
.map-card .map-img.placeholder {
  background:
    linear-gradient(rgba(11,23,51,0.6), rgba(11,23,51,0.0) 30%, rgba(11,23,51,0.0) 70%, rgba(11,23,51,0.5)),
    repeating-linear-gradient(90deg, var(--paper-2) 0 20px, var(--paper) 20px 40px),
    var(--paper-2);
  display: grid;
  place-items: center;
  color: rgba(11,23,51,0.45);
  font-family: var(--font-sans);
  font-size: 12px;
}
.map-card .map-img .corner-stamp {
  position: absolute;
  top: 10px; left: 10px;
  background: rgba(11,23,51,0.86);
  color: #fff;
  padding: 4px 8px 4px 10px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.16em;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  text-transform: uppercase;
  white-space: nowrap;
}
.map-card .map-img .corner-stamp::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%;
  background: var(--tape-yellow);
}
.map-card .map-pin {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -100%);
  width: 28px; height: 36px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25));
}
.map-card .map-meta {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: var(--paper-2);
  border-top: 1px dashed var(--paper-line);
}
.map-card .map-meta .pin-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--danger);
  box-shadow: 0 0 0 3px rgba(229,34,34,0.18);
}
.map-card .map-meta .place {
  font-weight: 700; color: var(--case-navy); font-size: 15px;
  display: flex; flex-direction: column;
}
.map-card .map-meta .addr {
  font-weight: 400;
  font-size: 12px;
  color: var(--case-navy-3);
  margin-top: 2px;
  font-family: var(--font-sans);
}
.map-card .map-meta .dist {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--case-navy-3);
  letter-spacing: 0;
  flex-shrink: 0;
  white-space: nowrap;
}

/* Mission checklist */
.mission-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
.mission-list li {
  display: grid;
  grid-template-columns: 22px 1fr;
  gap: 10px;
  align-items: start;
  font-size: 14px;
  line-height: 1.5;
  color: var(--case-navy);
}
.mission-list li .num {
  display: inline-flex;
  align-items: center; justify-content: center;
  width: 22px; height: 22px;
  background: var(--case-navy);
  color: #fff;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  border-radius: 50%;
}
.mission-list li.checked { color: rgba(11,23,51,0.5); }
.mission-list li.checked .num { background: var(--ok); color: #fff; }
.mission-list li.checked span:not(.num) { text-decoration: line-through; text-decoration-color: rgba(11,23,51,0.3); }

/* Warning / accent boxes */
.warn-box {
  background: #FFF8DB;
  border: 1px solid var(--tape-yellow-deep);
  border-left: 4px solid var(--tape-yellow-deep);
  padding: 12px 14px;
  border-radius: 8px;
  margin-bottom: 14px;
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--case-navy);
}
.warn-box .h {
  font-family: var(--font-sans);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: -0.01em;
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 6px;
  color: var(--case-navy);
}

.danger-box {
  background: #1B0F12;
  color: #FFD9D9;
  padding: 14px;
  border-radius: 8px;
  margin-bottom: 14px;
  font-size: 13.5px;
  line-height: 1.6;
  border: 1px solid #4a1a1a;
  position: relative;
  overflow: hidden;
}
.danger-box::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: repeating-linear-gradient(-45deg, var(--danger) 0 12px, #1B0F12 12px 22px);
}
.danger-box .h {
  font-family: var(--font-sans);
  color: var(--danger);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: -0.01em;
  margin: 4px 0 6px;
}
.danger-box strong { color: #fff; }

.brief-box {
  background: var(--case-navy);
  color: #fff;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 14px;
  font-size: 14px;
  line-height: 1.6;
  position: relative;
  overflow: hidden;
}
.brief-box::after {
  content: "EYES ONLY";
  position: absolute;
  top: 8px; right: 10px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(255,212,0,0.5);
  border: 1px solid rgba(255,212,0,0.4);
  padding: 2px 6px;
  border-radius: 2px;
}
.brief-box .h {
  font-family: var(--font-sans);
  font-size: 13px;
  letter-spacing: -0.01em;
  font-weight: 700;
  color: var(--tape-yellow);
  margin-bottom: 8px;
}

.question-box {
  background: var(--paper-2);
  border: 1px dashed var(--case-navy-3);
  padding: 16px;
  border-radius: 12px;
  margin: 16px 0;
}
.question-box .q {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px dashed rgba(11,23,51,0.15);
  font-size: 15px;
  font-weight: 600;
  color: var(--case-navy);
  line-height: 1.4;
}
.question-box .q:last-child { border-bottom: none; }
.question-box .q .qmark {
  color: var(--fpp-blue);
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: 18px;
  flex-shrink: 0;
}

.strategy-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.strategy-card {
  padding: 12px;
  border-radius: 10px;
  font-size: 12.5px;
  line-height: 1.45;
  color: var(--case-navy);
}
.strategy-card.coop { background: var(--fpp-blue-soft); border: 1px solid var(--fpp-blue); }
.strategy-card.solo { background: #1B0F12; color: #FFD9D9; border: 1px solid #4a1a1a; }
.strategy-card .h {
  font-family: var(--font-sans);
  font-size: 13px;
  letter-spacing: -0.01em;
  font-weight: 700;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.strategy-card.coop .h { color: var(--fpp-blue-deep); }
.strategy-card.solo .h { color: var(--danger); }

/* Sub-mission (보너스) box */
.sub-box {
  background: #FFF;
  border: 1px solid var(--paper-line);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 14px;
  position: relative;
}
.sub-box .badge-bonus {
  position: absolute;
  top: -10px; left: 12px;
  background: var(--tape-yellow);
  color: var(--tape-black);
  padding: 3px 8px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  font-weight: 800;
  border: 1px solid var(--tape-yellow-deep);
}
.sub-box .h {
  display: flex; align-items: center; gap: 8px;
  font-size: 13.5px;
  font-weight: 700;
  color: var(--case-navy);
  margin-bottom: 6px;
  font-family: var(--font-sans);
  letter-spacing: -0.01em;
}
.sub-box p { margin: 4px 0 0; font-size: 13.5px; line-height: 1.5; color: var(--case-navy); }
.sub-box .reward {
  margin-top: 8px;
  display: inline-flex;
  gap: 6px;
  padding: 4px 8px;
  background: var(--paper-2);
  border-radius: 6px;
  font-size: 12px;
  color: var(--case-navy);
  font-weight: 600;
}

/* Codex grid (도감) */
.codex-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 12px;
}
.codex-cell {
  aspect-ratio: 1/1;
  border: 1px dashed var(--case-navy-3);
  border-radius: 10px;
  display: grid;
  place-items: center;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--case-navy);
  background: var(--paper);
  padding: 6px;
  position: relative;
  line-height: 1.3;
}
.codex-cell .num {
  position: absolute;
  top: 4px; left: 6px;
  font-family: var(--font-mono);
  font-size: 9px;
  color: rgba(11,23,51,0.4);
}
.codex-cell.found {
  background: var(--fpp-blue-soft);
  border: 1px solid var(--fpp-blue);
  color: var(--fpp-blue-deep);
}
.codex-cell.found::after {
  content: "✓";
  position: absolute;
  top: 4px; right: 6px;
  font-family: var(--font-mono);
  color: var(--fpp-blue);
  font-weight: 800;
}

/* ============================================================
   Buttons & inputs
   ============================================================ */
.btn {
  -webkit-appearance: none;
  appearance: none;
  border: none;
  font-family: var(--font-sans);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.01em;
  padding: 16px 18px;
  border-radius: 12px;
  cursor: pointer;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform .12s ease, background .15s ease, box-shadow .15s ease;
}
.btn:active { transform: translateY(1px) scale(0.99); }
.btn-primary {
  background: var(--fpp-blue);
  color: #fff;
  box-shadow: 0 6px 18px -8px rgba(0,102,255,0.55), inset 0 -2px 0 rgba(0,0,0,0.12);
}
.btn-primary:disabled { background: var(--semantic-interaction-disable); color: var(--semantic-label-disable); box-shadow: none; cursor: not-allowed; }
.btn-secondary {
  background: var(--case-navy);
  color: #fff;
  box-shadow: 0 6px 18px -8px rgba(11,23,51,0.45);
}
.btn-ghost {
  background: transparent; color: var(--case-navy);
  border: 1px solid var(--paper-line);
}

.field {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 8px;
}
.field-label {
  font-family: var(--font-sans);
  font-size: 13px;
  letter-spacing: -0.01em;
  color: var(--case-navy);
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
}
.field-input {
  -webkit-appearance: none;
  appearance: none;
  border: 1.5px solid var(--paper-line);
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  font-size: 17px;
  font-family: var(--font-sans);
  color: var(--case-navy);
  outline: none;
  transition: border-color .15s ease, box-shadow .15s ease;
}
.field-input:focus { border-color: var(--fpp-blue); box-shadow: 0 0 0 3px rgba(0,102,255,0.15); }
.field-input::placeholder { color: rgba(11,23,51,0.35); }

/* Code input — boxed digits */
.code-input-wrap {
  background: #fff;
  border: 1.5px solid var(--paper-line);
  border-radius: 14px;
  padding: 14px;
  position: relative;
  transition: border-color .15s ease, box-shadow .15s ease;
}
.code-input-wrap.shake { animation: shake .35s ease; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}
.code-input-wrap.npc { border-color: var(--case-navy); border-width: 2px; box-shadow: 0 0 0 4px rgba(11,23,51,0.05); }
.code-input-wrap.player { border-color: var(--fpp-blue); border-width: 2px; box-shadow: 0 0 0 4px rgba(0,102,255,0.08); }
.code-input-wrap.error { border-color: var(--danger) !important; box-shadow: 0 0 0 4px rgba(229,34,34,0.12) !important; }

.code-input-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.code-input-head .icon {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  border-radius: 7px;
  background: var(--case-navy);
  color: var(--tape-yellow);
  font-size: 14px;
}
.code-input-wrap.player .code-input-head .icon {
  background: var(--fpp-blue); color: #fff;
}
.code-input-head .label {
  font-family: var(--font-sans);
  font-size: 14px;
  letter-spacing: -0.01em;
  font-weight: 700;
  color: var(--case-navy);
}
.code-input-head .hint {
  margin-left: auto;
  font-size: 11px;
  color: var(--case-navy-3);
  font-family: var(--font-mono);
  letter-spacing: 0;
  background: var(--paper);
  padding: 3px 8px;
  border-radius: 999px;
  border: 1px solid var(--paper-line);
}

.code-digits {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.code-digits .dgt {
  aspect-ratio: 1/1.1;
  background: var(--paper);
  border: 1.5px solid var(--paper-line);
  border-radius: 10px;
  display: grid;
  place-items: center;
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 700;
  color: var(--case-navy);
  transition: border-color .15s ease;
}
.code-digits .dgt.filled { border-color: var(--case-navy); background: #fff; }
.code-digits .dgt.cursor { border-color: var(--fpp-blue); animation: cursor-blink 1s infinite; }
@keyframes cursor-blink {
  0%, 49% { box-shadow: 0 0 0 2px rgba(0,102,255,0.2); }
  50%, 100% { box-shadow: 0 0 0 0 rgba(0,102,255,0); }
}
.code-input-wrap input.code-real {
  position: absolute; opacity: 0; pointer-events: none;
}

.code-word-input {
  width: 100%;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 22px;
  letter-spacing: 0.2em;
  font-weight: 700;
  border: 1.5px solid var(--paper-line);
  background: var(--paper);
  border-radius: 10px;
  padding: 14px;
  text-transform: uppercase;
  color: var(--case-navy);
  outline: none;
}
.code-word-input:focus { border-color: var(--fpp-blue); background: #fff; }

.code-helper {
  margin-top: 10px;
  font-size: 12px;
  color: var(--case-navy-3);
  display: flex;
  align-items: center;
  gap: 6px;
  line-height: 1.4;
}
.code-helper.error { color: var(--danger); font-weight: 600; }

/* Visible code chip — for participant codes shown on screen */
.visible-code {
  display: inline-flex;
  gap: 6px;
  padding: 8px 12px;
  border-radius: 8px;
  background: var(--case-navy);
  color: var(--tape-yellow);
  font-family: var(--font-mono);
  font-weight: 800;
  letter-spacing: 0.3em;
  font-size: 18px;
  position: relative;
}
.visible-code::before {
  content: "CODE";
  position: absolute;
  top: -10px; left: 8px;
  background: var(--tape-yellow); color: var(--tape-black);
  font-size: 9px; padding: 1px 6px; border-radius: 3px;
  letter-spacing: 0.16em;
  font-weight: 800;
  font-family: var(--font-mono);
}

/* ============================================================
   Bottom CTA dock — sticky
   ============================================================ */
.cta-dock {
  position: sticky;
  bottom: 0;
  background: linear-gradient(to top, var(--paper) 60%, rgba(245,241,232,0));
  padding: 16px 18px calc(18px + var(--safe-bottom));
  z-index: 20;
  margin-top: -120px;
}

/* ============================================================
   Mascot
   ============================================================ */
.mascot-hero {
  width: 180px; height: 180px;
  margin: 8px auto 0;
  display: block;
}
.mascot-float {
  position: fixed;
  bottom: 86px;
  right: 14px;
  z-index: 25;
  display: flex;
  align-items: flex-end;
  gap: 6px;
  pointer-events: auto;
}
@media (min-width: 720px) {
  .mascot-float { position: absolute; }
}
.mascot-float .bubble {
  background: #fff;
  border: 1.5px solid var(--case-navy);
  color: var(--case-navy);
  font-size: 12.5px;
  line-height: 1.4;
  padding: 8px 10px;
  border-radius: 12px 12px 4px 12px;
  max-width: 200px;
  box-shadow: 0 6px 14px -8px rgba(0,0,0,0.2);
  animation: bubble-in .4s ease-out;
  position: relative;
}
.mascot-float .bubble::after {
  content: ""; position: absolute; right: -6px; bottom: 8px;
  border: 6px solid transparent; border-left-color: var(--case-navy);
}
@keyframes bubble-in {
  from { opacity: 0; transform: translateY(6px) scale(0.9); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.mascot-float .figure {
  width: 56px; height: 56px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.18));
  animation: float-bob 3s ease-in-out infinite;
}
@keyframes float-bob {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50%      { transform: translateY(-4px) rotate(2deg); }
}

/* ============================================================
   Live Timer (countdown) — sticky beneath top bar
   ============================================================ */
.timer-bar {
  position: sticky;
  top: 0;
  z-index: 25;
  background: var(--case-navy-2);
  color: #fff;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.timer-bar.urgent {
  background: #2A0F12;
  animation: tb-pulse 1.4s ease-in-out infinite;
}
.timer-bar.stopped {
  background: var(--ok);
}
@keyframes tb-pulse {
  0%, 100% { background: #2A0F12; }
  50%      { background: #4A171C; }
}
.timer-bar .tb-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  font-weight: 800;
  color: var(--tape-yellow);
  text-transform: uppercase;
}
.timer-bar.urgent .tb-label { color: #FF8080; }
.timer-bar.stopped .tb-label { color: rgba(255,255,255,0.85); }
.timer-bar .tb-time {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 0.06em;
  color: #fff;
  font-variant-numeric: tabular-nums;
}
.timer-bar .tb-progress {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.12);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}
.timer-bar .tb-progress-fill {
  position: absolute;
  inset: 0;
  background: var(--tape-yellow);
  transform-origin: left;
  transition: transform .9s linear;
}
.timer-bar.urgent .tb-progress-fill { background: var(--danger); }
.timer-bar.stopped .tb-progress-fill { background: #fff; }

/* Inline mini-timer for the closing screen recap */
.timer-recap {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--case-navy);
  color: #fff;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,212,0,0.3);
  font-family: var(--font-mono);
}
.timer-recap .label {
  font-size: 10px;
  letter-spacing: 0.2em;
  font-weight: 700;
  color: var(--tape-yellow);
}
.timer-recap .val {
  font-size: 22px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}

/* ============================================================
   Final-answer input (3 tries)
   ============================================================ */
.tries-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--case-navy-3);
  letter-spacing: 0.08em;
}
.tries-row .pip {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1.5px solid var(--case-navy-3);
  background: transparent;
}
.tries-row .pip.used { background: var(--danger); border-color: var(--danger); }
.tries-row .pip.left { background: var(--ok); border-color: var(--ok); }

.answer-input-wrap {
  background: #fff;
  border: 2px solid var(--danger);
  border-radius: 14px;
  padding: 14px;
  position: relative;
  box-shadow: 0 0 0 4px rgba(229,34,34,0.1);
}
.answer-input-wrap.locked {
  border-color: var(--ok);
  box-shadow: 0 0 0 4px rgba(0,191,64,0.1);
  background: #F0FFF6;
}
.answer-input-wrap.shake { animation: shake .35s ease; }
.answer-input-wrap .h {
  font-family: var(--font-mono);
  font-size: 11.5px;
  letter-spacing: 0.18em;
  font-weight: 800;
  color: var(--danger);
  text-transform: uppercase;
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 6px;
}
.answer-input-wrap.locked .h { color: var(--ok); }
.answer-input-wrap .sub {
  font-size: 13px;
  color: var(--case-navy);
  margin-bottom: 10px;
  line-height: 1.5;
}
.answer-input-wrap .ans-row {
  display: flex; gap: 8px;
}
.answer-input-wrap input {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  border: 1.5px solid var(--paper-line);
  background: var(--paper);
  border-radius: 10px;
  padding: 14px;
  font-size: 18px;
  font-weight: 700;
  font-family: var(--font-sans);
  color: var(--case-navy);
  outline: none;
  text-align: center;
}
.answer-input-wrap input:focus { background: #fff; border-color: var(--danger); }
.answer-input-wrap input:disabled { opacity: 0.7; }
.answer-input-wrap .submit {
  padding: 0 18px;
  background: var(--danger);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
}
.answer-input-wrap .submit:disabled { opacity: 0.5; cursor: not-allowed; }
.answer-input-wrap.locked .ans-row { display: none; }
.answer-input-wrap .locked-msg {
  display: none;
  margin-top: 6px;
  font-size: 14px;
  font-weight: 700;
  color: var(--ok);
}
.answer-input-wrap.locked .locked-msg { display: block; }

.attempt-log {
  margin-top: 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--case-navy-3);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.attempt-log .row {
  display: flex; align-items: center; gap: 8px;
}
.attempt-log .row .badge {
  background: var(--paper-2);
  color: var(--danger);
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 700;
  letter-spacing: 0.06em;
}
.attempt-log .row .ans {
  color: var(--case-navy);
  font-weight: 600;
}

/* ============================================================
   Image slot (Before/After) — small inline placeholder
   ============================================================ */
.beforeafter {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 8px;
}
.beforeafter .ba-cell {
  position: relative;
}
.beforeafter .ba-cell .ba-label {
  position: absolute;
  top: 8px; left: 8px;
  z-index: 2;
  background: rgba(11,23,51,0.86);
  color: #fff;
  padding: 3px 8px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  font-weight: 800;
}
.beforeafter image-slot {
  width: 100%;
  height: 120px;
  display: block;
  border-radius: 10px;
  overflow: hidden;
}

/* ============================================================
   SOS button (top-right of screen)
   ============================================================ */
.sos-btn {
  position: absolute;
  top: calc(var(--safe-top) + 132px);
  right: 14px;
  z-index: 28;
  background: var(--danger);
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 800;
  font-family: var(--font-mono);
  letter-spacing: 0.16em;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  box-shadow: 0 6px 16px -6px rgba(229,34,34,0.55), inset 0 -2px 0 rgba(0,0,0,0.15);
  animation: sos-pulse 2s ease-in-out infinite;
}
@keyframes sos-pulse {
  0%, 100% { box-shadow: 0 6px 16px -6px rgba(229,34,34,0.55), 0 0 0 0 rgba(229,34,34,0.5), inset 0 -2px 0 rgba(0,0,0,0.15); }
  50%      { box-shadow: 0 6px 16px -6px rgba(229,34,34,0.55), 0 0 0 8px rgba(229,34,34,0), inset 0 -2px 0 rgba(0,0,0,0.15); }
}
.sos-btn:disabled {
  background: #999;
  animation: none;
  cursor: not-allowed;
  box-shadow: none;
}
.sos-btn .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #fff;
}

/* ============================================================
   Operator TOC button + panel
   ============================================================ */
.op-btn {
  position: absolute;
  left: 14px;
  bottom: calc(18px + var(--safe-bottom));
  z-index: 26;
  background: rgba(11,23,51,0.92);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.15);
  padding: 8px 12px 8px 10px;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 8px 18px -8px rgba(0,0,0,0.4);
}
.op-btn:hover { background: var(--case-navy); }
.op-btn-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px;
  background: var(--tape-yellow);
  color: var(--case-navy);
  border-radius: 4px;
  font-size: 12px;
  font-weight: 800;
  font-family: var(--font-mono);
}
.op-btn-label { color: #fff; }

.op-panel {
  text-align: left;
  padding: 0;
  width: 100%;
  max-width: 360px;
  overflow: hidden;
}
.op-head {
  display: flex; align-items: center;
  padding: 14px 16px;
  background: var(--case-navy);
  color: #fff;
  position: relative;
}
.op-head .op-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 16px;
  font-weight: 800;
  color: #fff;
}
.op-head .op-title .badge {
  background: var(--tape-yellow);
  color: var(--tape-black);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  font-weight: 800;
  padding: 3px 6px;
  border-radius: 3px;
}
.op-close {
  margin-left: auto;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.18);
  color: #fff;
  width: 28px; height: 28px;
  border-radius: 50%;
  font-size: 14px;
  cursor: pointer;
}
.op-sub {
  padding: 12px 16px 6px;
  font-size: 12.5px;
  color: var(--case-navy-3);
  line-height: 1.5;
  background: var(--paper);
  border-bottom: 1px dashed var(--paper-line);
}
.op-list {
  list-style: none;
  margin: 0;
  padding: 6px 8px;
  background: var(--paper);
  max-height: 460px;
  overflow-y: auto;
}
.op-item {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 10px 10px;
  border-radius: 8px;
  font-size: 14px;
  color: var(--case-navy);
  cursor: pointer;
  transition: background .15s ease;
}
.op-item:hover.unlocked {
  background: var(--fpp-blue-soft);
}
.op-item .op-num {
  display: inline-flex;
  align-items: center; justify-content: center;
  width: 30px; height: 30px;
  background: var(--case-navy);
  color: #fff;
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: 12px;
  border-radius: 6px;
}
.op-item .op-meta {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.op-item .op-label {
  font-weight: 700;
  font-size: 15px;
  color: var(--case-navy);
  letter-spacing: -0.01em;
}
.op-item .op-sub-line {
  font-size: 11.5px;
  color: var(--case-navy-3);
  font-family: var(--font-mono);
  letter-spacing: 0;
  margin-top: 2px;
}
.op-item .op-state {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--case-navy-3);
  letter-spacing: 0.06em;
  text-align: right;
  white-space: nowrap;
}

.op-item.locked {
  cursor: not-allowed;
  opacity: 0.55;
}
.op-item.locked .op-num {
  background: var(--paper-2);
  color: var(--case-navy-3);
}
.op-item.locked .op-label {
  color: var(--case-navy-3);
  font-family: var(--font-mono);
  letter-spacing: 0.12em;
  font-size: 13px;
}
.op-item.locked .op-state {
  color: var(--case-navy-3);
}

.op-item.current {
  background: var(--fpp-blue-soft);
  outline: 2px solid var(--fpp-blue);
}
.op-item.current .op-state {
  color: var(--fpp-blue-deep);
  background: var(--fpp-blue);
  color: #fff;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 10px;
  letter-spacing: 0.12em;
}

.op-foot {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--paper-line);
  background: #fff;
  font-size: 12px;
  color: var(--case-navy-3);
}
.op-foot-msg {
  flex: 1;
  line-height: 1.4;
}
.op-mini {
  padding: 8px 12px !important;
  font-size: 12px !important;
  border-radius: 8px !important;
  width: auto !important;
}

/* Modal */
.modal-scrim {
  position: fixed;
  inset: 0;
  background: rgba(11,23,51,0.6);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: grid;
  place-items: center;
  padding: 24px;
  animation: fade-in .2s ease;
}
@media (min-width: 720px) {
  .modal-scrim { position: absolute; }
}
@keyframes fade-in { from {opacity:0;} to {opacity:1;} }
.modal {
  background: #fff;
  border-radius: 18px;
  padding: 22px;
  max-width: 340px;
  width: 100%;
  text-align: center;
  animation: modal-in .25s ease;
  box-shadow: 0 20px 50px -10px rgba(0,0,0,0.3);
}
@keyframes modal-in { from { transform: translateY(8px) scale(0.96); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
.modal h3 { margin: 6px 0 8px; color: var(--case-navy); font-size: 19px; font-weight: 800; }
.modal p { margin: 0 0 16px; font-size: 14px; line-height: 1.55; color: var(--case-navy-3); }
.modal .icon-big {
  width: 48px; height: 48px;
  display: grid; place-items: center;
  margin: 0 auto;
  background: rgba(229,34,34,0.1);
  color: var(--danger);
  border-radius: 50%;
  font-size: 22px;
  font-weight: 800;
}
.modal .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.modal .btn { padding: 12px; font-size: 14px; }

/* Stamp (사건 종결) */
.stamp {
  display: inline-block;
  padding: 8px 16px;
  border: 3px solid var(--danger);
  color: var(--danger);
  font-family: var(--font-mono);
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  border-radius: 6px;
  transform: rotate(-6deg);
  font-size: 18px;
  background: rgba(255,255,255,0.6);
}

/* Closing reveal box */
.reveal-box {
  background: #fff;
  border: 2px solid var(--case-navy);
  border-radius: 12px;
  padding: 18px;
  margin: 16px 0;
  position: relative;
  text-align: center;
}
.reveal-box .h {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--case-navy-3);
  margin-bottom: 8px;
}
.reveal-box .h-ko { font-family: var(--font-sans); font-size: 12px; letter-spacing: 0; text-transform: none; font-weight: 600; }
.reveal-box .culprit {
  font-size: 26px;
  font-weight: 800;
  color: var(--case-navy);
  letter-spacing: -0.02em;
}
.reveal-box .culprit-placeholder {
  display: inline-block;
  padding: 4px 12px;
  border: 2px dashed var(--paper-line);
  border-radius: 8px;
  color: var(--case-navy-3);
  font-size: 18px;
  font-weight: 700;
}

/* Trophy box */
.trophy-box {
  background: linear-gradient(180deg, #FFF8DB 0%, #fff 100%);
  border: 1px solid var(--tape-yellow-deep);
  border-radius: 12px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13.5px;
  color: var(--case-navy);
  line-height: 1.5;
}
.trophy-box .ico {
  font-size: 24px;
}

/* ============================================================
   Tweaks panel anchor (Tweaks UI lives in app.jsx via starter)
   ============================================================ */

/* Subtle paper grain */
.phone-shell::before {
  content: ""; position: absolute; inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(11,23,51,0.04) 1px, transparent 0);
  background-size: 18px 18px;
  z-index: 0;
}
.phone-shell > * { position: relative; z-index: 1; }
.phone-shell > .modal-scrim { position: fixed; z-index: 100; }
@media (min-width: 720px) {
  .phone-shell > .modal-scrim { position: absolute; }
}
